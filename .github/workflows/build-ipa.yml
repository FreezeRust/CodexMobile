name: Build unsigned IPA

# Собирает НЕПОДПИСАННЫЙ .ipa OpenVolt на бесплатном macOS-раннере GitHub.
# Готовый .ipa скачиваешь из Artifacts и ставишь через SideStore.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_16*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (no codesign)
        run: |
          xcodebuild \
            -project OpenVolt.xcodeproj \
            -scheme OpenVolt \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Package into .ipa
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/OpenVolt.app"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r OpenVolt.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenVolt-unsigned-ipa
          path: OpenVolt.ipa
          if-no-files-found: error
